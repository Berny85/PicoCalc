{% extends "base.html" %}

{% block title %}{{ title }} - Picobellu Kalkulator{% endblock %}

{% block content %}
<div class="card">
    <h2>{{ title }}</h2>
    
    <form method="POST" action="{% if customer %}/customers/{{ customer.id }}{% else %}/customers{% endif %}">
        <div class="grid">
            <!-- Kundennummer (nur bei Neuanlage) -->
            {% if not customer %}
            <div class="form-group">
                <label for="customer_number">Kundennummer *</label>
                <input type="text" id="customer_number" name="customer_number" 
                       value="{{ customer_number }}" required readonly
                       style="background: #f5f5f5; font-family: monospace;">
                <small style="color: var(--color-text-light);">Wird automatisch vergeben</small>
            </div>
            {% endif %}
            
            <!-- Firma -->
            <div class="form-group" {% if customer %}style="grid-column: span 2;"{% endif %}>
                <label for="company_name">Firmenname (optional)</label>
                <input type="text" id="company_name" name="company_name" 
                       value="{{ customer.company_name if customer else '' }}">
            </div>
        </div>
        
        <div class="grid">
            <!-- Vorname -->
            <div class="form-group">
                <label for="first_name">Vorname *</label>
                <input type="text" id="first_name" name="first_name" 
                       value="{{ customer.first_name if customer else '' }}" required>
            </div>
            
            <!-- Nachname -->
            <div class="form-group">
                <label for="last_name">Nachname *</label>
                <input type="text" id="last_name" name="last_name" 
                       value="{{ customer.last_name if customer else '' }}" required>
            </div>
        </div>
        
        <h3 style="margin-top: 30px; color: var(--color-primary-dark);">📍 Adresse</h3>
        
        <div class="form-group">
            <label for="address_line1">Straße und Hausnummer</label>
            <input type="text" id="address_line1" name="address_line1" 
                   value="{{ customer.address_line1 if customer else '' }}">
        </div>
        
        <div class="form-group">
            <label for="address_line2">Adresszusatz (optional)</label>
            <input type="text" id="address_line2" name="address_line2" 
                   value="{{ customer.address_line2 if customer else '' }}">
        </div>
        
        <div class="grid">
            <div class="form-group">
                <label for="postal_code">PLZ</label>
                <input type="text" id="postal_code" name="postal_code" 
                       value="{{ customer.postal_code if customer else '' }}">
            </div>
            
            <div class="form-group">
                <label for="city">Ort</label>
                <input type="text" id="city" name="city" 
                       value="{{ customer.city if customer else '' }}">
            </div>
            
            <div class="form-group">
                <label for="country">Land</label>
                <input type="text" id="country" name="country" 
                       value="{{ customer.country if customer else 'Deutschland' }}">
            </div>
        </div>
        
        <h3 style="margin-top: 30px; color: var(--color-primary-dark);">📞 Kontakt</h3>
        
        <div class="grid">
            <div class="form-group">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" 
                       value="{{ customer.email if customer else '' }}">
            </div>
            
            <div class="form-group">
                <label for="phone">Telefon</label>
                <input type="tel" id="phone" name="phone" 
                       value="{{ customer.phone if customer else '' }}">
            </div>
        </div>
        
        <div class="form-group">
            <label for="vat_id">USt-IdNr. (optional)</label>
            <input type="text" id="vat_id" name="vat_id" 
                   value="{{ customer.vat_id if customer else '' }}"
                   placeholder="z.B. DE123456789">
        </div>
        
        <div class="form-group">
            <label for="notes">Notizen (intern)</label>
            <textarea id="notes" name="notes" rows="3">{{ customer.notes if customer else '' }}</textarea>
        </div>
        
        <div class="actions" style="margin-top: 30px;">
            <button type="submit" class="btn btn-primary btn-lg">
                {% if customer %}💾 Änderungen speichern{% else %}➕ Kunde anlegen{% endif %}
            </button>
            <a href="/customers" class="btn btn-secondary">Abbrechen</a>
        </div>
    </form>
</div>
{% endblock %}
